<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XPERT Global Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 250px;
      background: #111827;
      color: white;
      padding: 20px;
    }
    .sidebar h2 {
      margin-top: 0;
      font-size: 22px;
    }
    .sidebar a {
      display: block;
      color: #9CA3AF;
      padding: 10px 0;
      text-decoration: none;
    }
    .sidebar a:hover {
      color: white;
    }
    .content {
      flex: 1;
      padding: 30px;
      background: #F3F4F6;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #2563EB;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>XPERT Global</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="pay.html">Real‑Time Payment Test</a>
  </div>

  <div class="content">
    <h1>Welcome to XPERT Global Dashboard</h1>

    <div class="card">
      <h3>Real‑Time Payment Test</h3>
      <p>Trigger a live ₦1,000 payment and watch your webhook fire instantly.</p>
      <a href="pay.html" class="btn">Run Test Payment</a>
    </div>
  </div>

</body>
</html>
