name: XPERT AI Trading System – CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint --if-present

  security:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: npm Audit
        run: npm audit --audit-level=moderate

  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test --if-present

      - name: Generate Coverage Report
        run: npm run coverage --if-present

  build:
    name: 🏗️ Build & Validate
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build --if-present

  artifacts:
    name: 📤 Upload Artifacts
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  notify:
    name: 💬 Notify Results
    runs-on: ubuntu-latest
    if: failure()
    needs: [lint, security, test, build]
    steps:
      - name: Notify Failure
        run: |
          echo "❌ CI Pipeline Failed!"
          echo "Check the logs for details."
